# Development server configuration (Docker / Alpine)

server {
    listen 80;
    server_name _;
    
    # Relative redirects
    absolute_redirect off;

    # Path to static build inside container
    root /usr/share/nginx/html;

    # Log to stdout/stderr for Docker (no file growth issues)
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    include /etc/nginx/common/app.conf;
}