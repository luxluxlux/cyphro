# Production server configuration (Ubuntu VPS)

server {
    listen 443 ssl http2;
    
    # www handling is expected to be configured either in CDN or via nginx redirect server block
    server_name cyphro.io;

    ssl_certificate /etc/letsencrypt/live/cyphro.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyphro.io/privkey.pem;

    # Uncomment for simple token-based auth (e.g. for CDN)
    # if ($http_x_origin_auth != "secret-token") {
    #     return 403;
    # }

    # Path to deployed static files on VPS
    root /var/www/cyphro;

    # Log files (managed by logrotate)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    include /etc/nginx/common/app.conf;
}